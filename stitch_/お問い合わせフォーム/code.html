<!DOCTYPE html>
<html class="light" lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Contact Form - Portfolio</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#E5E7EB",
            "background-light": "#F9FAFB",
            "background-dark": "#111827",
            "success": "#28A745",
            "error": "#DC3545",
            "accent": "#F3F4F6"
          },
          fontFamily: {
            "display": ["Spline Sans", "Noto Sans", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "1rem",
            "lg": "1.5rem",
            "xl": "2rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
<style>
    .form-input-group {
      position: relative;
    }
    .form-input {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .form-label {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: #6B7280;
        background-color: var(--label-bg, #FFFFFF);
        padding: 0 0.25rem;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        pointer-events: none;
        transform-origin: left center;
    }
    .dark .form-label {
        --label-bg: #1F2937;
    }
    .form-input:focus + .form-label,
    .form-input:not(:placeholder-shown) + .form-label {
        top: 0;
        transform: translateY(-50%) scale(0.85);
        color: #111827;
    }
    .dark .form-input:focus + .form-label,
    .dark .form-input:not(:placeholder-shown) + .form-label {
        color: #D1D5DB;
    }
    .submit-button .arrow {
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .submit-button:hover .arrow {
      transform: translateX(4px) rotate(45deg);
    }
    .submit-button .text-container {
        overflow: hidden;
        position: relative;
        display: inline-block;
        vertical-align: bottom;
    }
    .submit-button .text-original {
        transition: transform 0.4s cubic-bezier(0.76, 0, 0.24, 1);
        display: inline-block;
    }
    .submit-button:hover .text-original {
        transform: translateY(-100%);
    }
    .submit-button .text-hover {
        position: absolute;
        left: 0;
        transform: translateY(100%);
        transition: transform 0.4s cubic-bezier(0.76, 0, 0.24, 1);
        display: inline-block;
    }
    .submit-button:hover .text-hover {
        transform: translateY(0);
    }
  </style>
</head>
<body class="bg-background-light text-gray-800">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<header class="sticky top-0 z-10 bg-background-light/80 backdrop-blur-md">
<div class="px-4 sm:px-10 lg:px-40 flex justify-center">
<div class="flex items-center justify-between whitespace-nowrap border-b border-solid border-gray-200 w-full max-w-[960px] px-4 sm:px-10 py-3">
<div class="flex items-center gap-4 text-gray-900">
<div class="size-6 text-gray-900">
<svg fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<g clip-path="url(#clip0_6_319)">
<path d="M8.57829 8.57829C5.52816 11.6284 3.451 15.5145 2.60947 19.7452C1.76794 23.9758 2.19984 28.361 3.85056 32.3462C5.50128 36.3314 8.29667 39.7376 11.8832 42.134C15.4698 44.5305 19.6865 45.8096 24 45.8096C28.3135 45.8096 32.5302 44.5305 36.1168 42.134C39.7033 39.7375 42.4987 36.3314 44.1494 32.3462C45.8002 28.361 46.2321 23.9758 45.3905 19.7452C44.549 15.5145 42.4718 11.6284 39.4217 8.57829L24 24L8.57829 8.57829Z" fill="currentColor"></path>
</g>
<defs>
<clipPath id="clip0_6_319"><rect fill="white" height="48" width="48"></rect></clipPath>
</defs>
</svg>
</div>
<h2 class="text-xl font-bold leading-tight tracking-[-0.015em]">Portfolio</h2>
</div>
<div class="hidden md:flex items-center gap-9">
<a class="text-gray-500 text-sm font-medium leading-normal hover:text-gray-900 transition-colors" href="#">Works</a>
<a class="text-gray-500 text-sm font-medium leading-normal hover:text-gray-900 transition-colors" href="#">About Me</a>
<a class="text-gray-900 text-sm font-bold leading-normal" href="#">Contact</a>
</div>
<div class="md:hidden">
<button class="flex items-center justify-center p-2 rounded-full bg-gray-100 text-gray-900">
<span class="material-symbols-outlined">menu</span>
</button>
</div>
</div>
</div>
</header>
<main class="flex flex-1 justify-center py-10 sm:py-16 px-4">
<div class="layout-content-container flex flex-col max-w-[960px] flex-1">
<div class="flex flex-wrap justify-between gap-6 p-4">
<div class="flex flex-col gap-3">
<p class="text-gray-900 text-5xl font-black leading-tight tracking-[-0.033em]">CONTACT</p>
<p class="text-gray-500 text-base font-normal leading-normal">作品や私について、ご興味を持っていただけましたら、<br/>以下のフォームよりお気軽にお問い合わせください。</p>
</div>
</div>
<form class="space-y-8 p-4 mt-8">
<div class="form-input-group">
<input class="form-input w-full resize-none overflow-hidden rounded-lg text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400 border border-gray-200 bg-white h-14 placeholder:text-transparent p-4 text-base font-normal leading-normal" id="name" placeholder="お名前" required="" type="text"/>
<label class="form-label text-base" for="name">お名前</label>
</div>
<div class="form-input-group">
<input class="form-input w-full resize-none overflow-hidden rounded-lg text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400 border border-gray-200 bg-white h-14 placeholder:text-transparent p-4 text-base font-normal leading-normal" id="email" placeholder="メールアドレス" required="" type="email"/>
<label class="form-label text-base" for="email">メールアドレス</label>
</div>
<div class="form-input-group">
<input class="form-input w-full resize-none overflow-hidden rounded-lg text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400 border border-gray-200 bg-white h-14 placeholder:text-transparent p-4 text-base font-normal leading-normal" id="subject" placeholder="件名" type="text"/>
<label class="form-label text-base" for="subject">件名</label>
</div>
<div class="form-input-group">
<textarea class="form-input w-full resize-y overflow-hidden rounded-lg text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-400 border border-gray-200 bg-white h-40 placeholder:text-transparent p-4 text-base font-normal leading-normal" id="message" placeholder="お問い合わせ内容" required=""></textarea>
<label class="form-label text-base" for="message">お問い合わせ内容</label>
</div>
<div class="flex justify-center pt-4">
<button class="submit-button group flex min-w-[200px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-16 px-8 bg-gray-900 text-white text-lg font-bold leading-normal tracking-[0.015em] transition-all duration-300 ease-in-out hover:bg-gray-800 focus:outline-none focus:ring-4 focus:ring-gray-900/20" type="submit">
<span class="text-container">
<span class="text-original">送信する</span>
<span class="text-hover">送信する</span>
</span>
<span class="material-symbols-outlined ml-2 arrow">arrow_forward</span>
</button>
</div>
</form>
</div>
</main>
</div>
</div>
</body></html>
